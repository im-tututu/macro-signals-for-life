name: Deploy Python Stack To Server

on:
  push:
    branches:
      - main
    paths:
      - "py/**"
      - "tools/server/**"
  workflow_dispatch:

concurrency:
  group: deploy-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug server settings
        run: |
          echo "host_len=${#SERVER_HOST}"
          echo "port=$SERVER_PORT"
          echo "user=$SERVER_USER"
          echo "app_dir_len=${#SERVER_APP_DIR}"
          nslookup "$SERVER_HOST" || true

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote app dir
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "mkdir -p '${SERVER_APP_DIR}'"

      - name: Rsync project files (incremental)
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${SERVER_PORT:-22}" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude "py/data/" \
            py docs tools .env.example README.md TODO.md \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_APP_DIR}/"

      - name: Prepare runtime on server (smart pip)
        run: |
          set -euo pipefail
          REQ_HASH="$(sha256sum py/requirements.txt | awk '{print $1}')"
          ssh -i ~/.ssh/id_deploy -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "APP_DIR='${SERVER_APP_DIR}' REQ_HASH='${REQ_HASH}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$APP_DIR"
          mkdir -p .runtime

          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip

          REQ_HASH_FILE=".runtime/requirements.sha256"
          PREV_HASH="$(cat "$REQ_HASH_FILE" 2>/dev/null || true)"
          if [ "$PREV_HASH" != "$REQ_HASH" ]; then
            echo "[INFO] requirements changed, installing deps..."
            pip install -r py/requirements.txt
            echo "$REQ_HASH" > "$REQ_HASH_FILE"
          else
            echo "[INFO] requirements unchanged, skip pip install"
          fi

          python py/scripts/run_metrics_snapshot.py --dry-run --print-sample 0
          EOF
