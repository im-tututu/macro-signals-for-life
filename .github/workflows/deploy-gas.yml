name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'gas/**'
      - '.github/workflows/deploy-gas.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gas/package.json

      - name: Install dependencies
        working-directory: gas
        run: npm install

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const raw = (process.env.CLASPRC_JSON || "").trim();
          if (!raw) {
            throw new Error("Missing CLASPRC_JSON secret");
          }
          const parsed = JSON.parse(raw);
          let output = parsed;

          // Backward compatibility: some existing secrets were stored as
          // {"tokens":{"default":{client_id, client_secret, refresh_token, access_token}}}
          if (parsed.tokens && parsed.tokens.default) {
            const token = parsed.tokens.default;
            output = {
              token: {
                access_token: token.access_token || "",
                refresh_token: token.refresh_token || "",
                scope: token.scope || "",
                token_type: token.token_type || "Bearer",
                expiry_date: token.expiry_date || 0,
              },
              oauth2ClientSettings: {
                clientId: token.client_id || "",
                clientSecret: token.client_secret || "",
                redirectUri: token.redirect_uri || "http://localhost",
              },
              isLocalCreds: false,
            };
          }

          fs.writeFileSync(
            `${process.env.HOME}/.clasprc.json`,
            `${JSON.stringify(output, null, 2)}\n`,
            "utf8",
          );
          EOF

      - name: Write .clasp.json
        run: |
          cat > gas/.clasp.json <<'EOF'
          {
            "scriptId": "${{ secrets.GAS_SCRIPT_ID }}",
            "rootDir": "src"
          }
          EOF

      - name: Push to Apps Script
        working-directory: gas
        run: npx clasp push -f

      - name: Sync external API keys to Script Properties
        env:
          GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          const auth = JSON.parse(
            fs.readFileSync(`${process.env.HOME}/.clasprc.json`, "utf8"),
          );
          const token = auth.token || auth.tokens?.default || auth;
          const clientId = auth.oauth2ClientSettings?.clientId || token.client_id;
          const clientSecret =
            auth.oauth2ClientSettings?.clientSecret || token.client_secret;
          const refreshToken = token.refresh_token;

          if (!clientId || !clientSecret || !refreshToken) {
            throw new Error("Missing OAuth fields in .clasprc.json");
          }

          async function main() {
            const tokenResp = await fetch("https://oauth2.googleapis.com/token", {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: new URLSearchParams({
                client_id: clientId,
                client_secret: clientSecret,
                refresh_token: refreshToken,
                grant_type: "refresh_token",
              }),
            });

            if (!tokenResp.ok) {
              throw new Error(
                `Failed to refresh access token: ${tokenResp.status} ${await tokenResp.text()}`,
              );
            }

            const tokenJson = await tokenResp.json();
            const accessToken = tokenJson.access_token;
            if (!accessToken) {
              throw new Error("OAuth token response missing access_token");
            }

            const runResp = await fetch(
              `https://script.googleapis.com/v1/scripts/${process.env.GAS_SCRIPT_ID}:run`,
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${accessToken}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  function: "setApiKeysFromParams",
                  parameters: [
                    process.env.FRED_API_KEY,
                    process.env.ALPHA_VANTAGE_API_KEY,
                  ],
                  devMode: true,
                }),
              },
            );

            const runJson = await runResp.json();
            if (!runResp.ok || runJson.error) {
              throw new Error(
                `Apps Script API run failed: ${JSON.stringify(runJson)}`,
              );
            }

            console.log(JSON.stringify(runJson.response?.result || runJson, null, 2));
          }

          main().catch((error) => {
            console.error(error.message || String(error));
            process.exit(1);
          });
          EOF
