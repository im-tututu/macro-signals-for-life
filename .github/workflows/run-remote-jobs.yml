name: Run Remote Jobs

on:
  workflow_dispatch:
    inputs:
      group:
        description: "job group: cn_night / us_morning / manual"
        required: true
        default: "cn_night"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
    steps:
      - name: Run group on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ env.SERVER_PORT || '22' }}
          script: |
            set -e
            cd "${{ env.SERVER_APP_DIR }}"
            . .venv/bin/activate
            python py/scripts/run_job_group.py "${{ github.event.inputs.group }}"
