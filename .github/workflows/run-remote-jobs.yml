name: Run Remote Jobs

on:
  workflow_dispatch:
    inputs:
      group:
        description: "job group: cn_night / us_morning / manual"
        required: true
        default: "cn_night"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run group on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '50022' }}
          script: |
            set -e
            cd /home/ubuntu/apps/macro-signals-for-life-1
            . .venv/bin/activate
            python py/scripts/run_job_group.py "${{ github.event.inputs.group }}"
            python py/scripts/run_metrics_snapshot.py --print-sample 0
